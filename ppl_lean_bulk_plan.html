<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6-Day PPL — Lean Bulk</title>
<style>
:root{

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:auto;}
body{font-family:var(--font-sans);background:#FAF9F5;color:var(--color-text-primary);min-height:100vh;overflow-y:auto;-webkit-font-smoothing:antialiased;}

.wrap{padding:.5rem 0 0;}
.tabs{display:flex;gap:5px;margin-bottom:1.25rem;flex-wrap:wrap;}
.tab{padding:6px 13px;font-size:12px;font-weight:500;border-radius:999px;border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;color:var(--color-text-secondary);transition:all .15s;}

.tab.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary);}
.panel{display:none;}.panel.active{display:block;}
.day-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.03);}
.day-header{display:flex;align-items:center;gap:10px;padding:.85rem 1.25rem;border-bottom:0.5px solid var(--color-border-tertiary);}
.day-icon{width:34px;height:34px;border-radius:var(--border-radius-md);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.day-title{font-size:14px;font-weight:600;color:var(--color-text-primary);}
.day-sub{font-size:11px;color:var(--color-text-secondary);margin-top:1px;}
.badge{font-size:11px;padding:2px 9px;border-radius:999px;font-weight:500;margin-left:auto;flex-shrink:0;}
.col-header{display:grid;grid-template-columns:1fr 96px 66px;gap:6px;padding:5px 1.25rem;background:var(--color-background-secondary);}
.col-h{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-tertiary);}
.ex-row{display:grid;grid-template-columns:1fr 96px 66px;align-items:center;gap:6px;padding:7px 1.25rem;border-bottom:0.5px solid var(--color-border-tertiary);}
.ex-row:last-child{border-bottom:none;}
.ex-row:hover{background:var(--color-background-secondary);}
.ex-name{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.ex-muscle{font-size:11px;color:var(--color-text-secondary);margin-top:1px;}
.ex-sets{font-size:12px;color:var(--color-text-secondary);text-align:center;}
.ex-rpe{font-size:11px;padding:2px 7px;border-radius:999px;background:var(--color-background-secondary);color:var(--color-text-secondary);width:fit-content;margin-left:auto;white-space:nowrap;}
.changed{background:#FDF6EC;}
.changed .ex-name{color:#854F0B;}
.kept{background:#F0FAF5;}
.kept .ex-name{color:#085041;}
.added{background:#EEF0FE;}
.added .ex-name{color:#2E2A6B;}
.tag{font-size:10px;padding:1px 6px;border-radius:999px;margin-left:5px;vertical-align:middle;font-weight:500;white-space:nowrap;}
.tag-swap{background:#FAEEDA;color:#633806;}
.tag-keep{background:#E1F5EE;color:#085041;}
.tag-add{background:#E1E4FC;color:#2E2A6B;}
.note{font-size:11px;color:var(--color-text-tertiary);padding:.4rem .25rem 0;line-height:1.55;}
.info-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:.8rem 1rem;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.03);}

.info-text{font-size:12px;color:var(--color-text-secondary);line-height:1.55;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:6px;}
.rule-item{display:flex;gap:8px;font-size:12px;color:var(--color-text-secondary);margin-bottom:6px;line-height:1.5;}
.dtable{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.dtable th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-tertiary);font-weight:500;padding:5px 8px;border-bottom:0.5px solid var(--color-border-secondary);}

.dtable .total td{font-weight:600;color:var(--color-text-primary);background:var(--color-background-secondary);}
.num{text-align:right;white-space:nowrap;}
.recipe{list-style:none;}
.recipe li{display:flex;gap:8px;font-size:12px;color:var(--color-text-secondary);margin-bottom:5px;line-height:1.5;}

</style>
</head>

const tagColors = {swap:"tag-swap", keep:"tag-keep", add:"tag-add"};
const rowClassMap = {swap:" changed", keep:" kept", add:" added"};
const barbellSVG = (c)=>`<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8v8M8 6v12M16 6v12M20 8v8M8 12h8"/></svg>`;

days.forEach((d,i)=>{
  const btn = document.createElement("button");
  btn.className = "tab"+(i===0?" active":"");
  btn.textContent = d.label;
  btn.onclick = ()=>{
    document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("p"+i).classList.add("active");
  };
  tabsEl.appendChild(btn);

  const panel = document.createElement("div");
  panel.className = "panel"+(i===0?" active":"");
  panel.id = "p"+i;

  if(d.html){ panel.innerHTML = d.html; panelsEl.appendChild(panel); return; }

  panel.innerHTML = `
    <div class="day-card">
      <div class="day-header">
        <div class="day-icon" style="background:${d.color};">${barbellSVG(d.tc)}</div>
        <div><div class="day-title">${d.name}</div><div class="day-sub">${d.muscles}</div></div>
        <span class="badge" style="background:${d.color};color:${d.tc};">${d.badge}</span>

      <div class="col-header">
        <span class="col-h">Exercise</span>

        <span class="col-h" style="text-align:right;">Effort</span>
      </div>
      ${d.exercises.map(e=>{
        const rc = e.tag ? (rowClassMap[e.tagType] || ' changed') : '';
        return `
        <div class="ex-row${rc}">
          <div>
            <div class="ex-name">${e.name}${e.tag?`<span class="tag ${tagColors[e.tagType]||'tag-swap'}">${e.tag}</span>`:''}</div>
            <div class="ex-muscle">${e.muscle}</div>
          </div>
          <div class="ex-sets">${e.sets}</div>
          <div><span class="ex-rpe">${e.rpe}</span></div>
        </div>`;
      }).join("")}
    </div>
    ${d.note?`<p class="note">${d.note}</p>`:''}
  `;
  panelsEl.appendChild(panel);
});
